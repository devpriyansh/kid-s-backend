---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.userMobileBackend.name }}
  namespace: {{ .Values.userMobileBackend.namespace }}
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    external-dns.alpha.kubernetes.io/hostname: api.{{ .Values.userMobileBackend.domain }}
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.userMobileBackend.awsCertArn }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig": { "Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'
    alb.ingress.kubernetes.io/group.name: {{ .Values.userMobileBackend.awsAlbGroupName }}
    alb.ingress.kubernetes.io/subnets: {{ .Values.userMobileBackend.awsAlbSubnets }}
spec:
  ingressClassName: alb
  rules:
  - host: api.{{ .Values.userMobileBackend.domain }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ssl-redirect
            port:
              name: use-annotation
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.userMobileBackend.name }}
            port:
              number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.userMobileBackend.name }}-internal
  namespace: {{ .Values.userMobileBackend.namespace }}
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    external-dns.alpha.kubernetes.io/hostname: api.{{ .Values.userMobileBackend.domain }}
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.userMobileBackend.awsCertArn }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig": { "Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'
    alb.ingress.kubernetes.io/group.name: {{ .Values.userMobileBackend.awsAlbGroupName }}-internal
    alb.ingress.kubernetes.io/subnets: {{ .Values.userMobileBackend.awsAlbInternalSubnets }} # Use internal subnets here
spec:
  ingressClassName: alb
  rules:
  - host: api.{{ .Values.userMobileBackend.domain }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ssl-redirect
            port:
              name: use-annotation
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.userMobileBackend.name }}
            port:
              number: 80
